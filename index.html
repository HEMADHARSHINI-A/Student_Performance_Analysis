<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Performance Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<div class="container">

<h1>🎓 Student Performance Analysis Dashboard</h1>

<div class="cards">

<div class="card">
<h2>100</h2>
<p>Students</p>
</div>

<div class="card">
<h2>62.51</h2>
<p>Avg Math Score</p>
</div>

<div class="card">
<h2>60.53</h2>
<p>Avg Writing Score</p>
</div>

<div class="card">
<h2>60.49</h2>
<p>Avg Reading Score</p>
</div>

</div>

<div class="charts">

<div class="chart-box">
<canvas id="ethnicityChart"></canvas>
</div>

<div class="chart-box">
<canvas id="genderChart"></canvas>
</div>

</div>

<div class="charts">

<div class="chart-box">
<canvas id="educationChart"></canvas>
</div>

<div class="chart-box">
<canvas id="prepChart"></canvas>
</div>

</div>

<div class="table-box">

<h2>Top Students</h2>

<table>

<thead>
<tr>
<th>Name</th>
<th>Math</th>
<th>Reading</th>
<th>Writing</th>
</tr>
</thead>

<tbody>

<tr>
<td>Student 1</td>
<td>95</td>
<td>98</td>
<td>97</td>
</tr>

<tr>
<td>Student 2</td>
<td>93</td>
<td>95</td>
<td>96</td>
</tr>

<tr>
<td>Student 3</td>
<td>92</td>
<td>94</td>
<td>95</td>
</tr>

</tbody>

</table>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
